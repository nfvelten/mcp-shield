name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bins: gateway audit
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            bins: gateway audit
            use_cross: true
          - os: macos-13
            target: x86_64-apple-darwin
            bins: gateway audit
          - os: macos-latest
            target: aarch64-apple-darwin
            bins: gateway audit
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bins: gateway.exe audit.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.use_cross != true
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          TAG="${{ github.ref_name }}"
          TARGET="${{ matrix.target }}"
          ARCHIVE="mcp-gateway-${TAG}-${TARGET}.tar.gz"
          cp target/${TARGET}/release/gateway  ./gateway
          cp target/${TARGET}/release/audit    ./audit
          tar -czf "${ARCHIVE}" gateway audit
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Package binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          $TARGET = "${{ matrix.target }}"
          $ARCHIVE = "mcp-gateway-${TAG}-${TARGET}.zip"
          Copy-Item "target\${TARGET}\release\gateway.exe" .\gateway.exe
          Copy-Item "target\${TARGET}\release\audit.exe"   .\audit.exe
          Compress-Archive -Path gateway.exe, audit.exe -DestinationPath $ARCHIVE
          "ARCHIVE=$ARCHIVE" | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
